<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Predictor AI</title>
    <style>
        :root {
            --bg-main: #0b0c16;
            --card-bg: rgba(20, 22, 41, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.1);
            --btn-gradient: linear-gradient(90deg, #6366f1 0%, #3b82f6 100%);
            --text-accent: #34bc98;
            --text-main: #FFFFFF;
            --text-sub: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%);
        }

        /* Container Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 40px 35px; 
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            width: 440px; 
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        /* Header Elements */
        .avatar-container {
            width: 90px;
            height: 90px;
            margin: 10px auto 20px auto;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower-icon {
            width: 64px;
            height: 64px;
        }

        h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle { 
            color: var(--text-sub); 
            margin-top: 8px; 
            margin-bottom: 30px; 
            font-size: 0.95rem; 
        }

        /* Input Container */
        .input-row-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px; 
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex; 
            align-items: center;
            gap: 16px;
        }

        /* Icon Wrapper Box */
        .icon-box {
            background: rgba(255, 255, 255, 0.03);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0;
        }

        .leaf-svg {
            fill: none;
            stroke: #818cf8;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-block { 
            flex-grow: 1; 
            text-align: left; 
        }
        
        .input-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-label { 
            font-size: 0.85rem; 
            color: #e2e8f0; 
            font-weight: 500;
        }

        .unit-badge {
            background: rgba(255, 255, 255, 0.06);
            color: #64748b; 
            font-size: 0.75rem; 
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Input Fields */
        input {
            width: 100%; 
            padding: 12px 14px; 
            border-radius: 10px;
            background: #131526; 
            color: #ffffff; 
            border: 1px solid var(--input-border);
            font-size: 1.05rem; 
            font-weight: 500;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Main Action Button */
        button {
            width: 100%; 
            padding: 16px; 
            margin-top: 10px;
            background: var(--btn-gradient);
            color: white; 
            font-weight: 600; 
            font-size: 1.05rem;
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }
        
        button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4); 
        }
        button:active { transform: translateY(1px); }

        .footer-note {
            color: #475569;
            font-size: 0.75rem;
            margin-top: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        /* Results Display Card */
        #result-section {
            margin-top: 20px;
            background: rgba(52, 188, 152, 0.06);
            border-radius: 14px; 
            border: 1px solid rgba(52, 188, 152, 0.2);
            display: none; 
            align-items: center;
            padding: 16px; 
            gap: 16px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .result-info { text-align: left; }
        .result-title { font-size: 0.75rem; color: #a7f3d0; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .result-species { font-size: 1.3rem; font-weight: 700; color: #34bc98; margin-top: 2px; }

    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">
            <svg class="flower-icon" viewBox="0 0 64 64">
                <path fill="#818cf8" d="M32 4C24 4 18 12 18 22c0 12 14 26 14 26s14-14 14-26c0-10-6-12-14-12z" opacity="0.85"/>
                <path fill="#60a5fa" d="M32 16c-5 0-9 5-9 11 0 7 9 17 9 17s9-10 9-17c0-6-4-11-9-11z" opacity="0.9"/>
                <path fill="#38bdf8" d="M32 24c-2.5 0-4.5 2.5-4.5 5.5 0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-3-2-5.5-4.5-5.5z"/>
            </svg>
        </div>

        <h1>Iris Predictor</h1>
        <p class="subtitle">Enter the flower measurements to predict the Iris species.</p>
        
        <div class="input-row-card">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24"><path class="leaf-svg" d="M2 22C2 22 6 18 12 17C18 16 22 11 22 4C15 4 10 8 9 14C8 20 2 22 2 22Z"/><path class="leaf-svg" d="M9 14L22 4"/></svg>
            </div>
            <div class="input-block">
                <div class="input-header-meta">
                    <span class="input-label">Sepal Length</span>
                    <span class="unit-badge">cm</span>
                </div>
                <input type="number" id="sl" step="0.1" value="5.1">
            </div>
        </div>

        <div class="input-row-card">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24"><path class="leaf-svg" d="M2 22C2 22 6 18 12 17C18 16 22 11 22 4C15 4 10 8 9 14C8 20 2 22 2 22Z"/><path class="leaf-svg" d="M9 14L22 4"/></svg>
            </div>
            <div class="input-block">
                <div class="input-header-meta">
                    <span class="input-label">Sepal Width</span>
                    <span class="unit-badge">cm</span>
                </div>
                <input type="number" id="sw" step="0.1" value="3.5">
            </div>
        </div>

        <div class="input-row-card">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24"><path class="leaf-svg" d="M2 22C2 22 6 18 12 17C18 16 22 11 22 4C15 4 10 8 9 14C8 20 2 22 2 22Z"/><path class="leaf-svg" d="M9 14L22 4"/></svg>
            </div>
            <div class="input-block">
                <div class="input-header-meta">
                    <span class="input-label">Petal Length</span>
                    <span class="unit-badge">cm</span>
                </div>
                <input type="number" id="pl" step="0.1" value="1.4">
            </div>
        </div>

        <div class="input-row-card">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24"><path class="leaf-svg" d="M2 22C2 22 6 18 12 17C18 16 22 11 22 4C15 4 10 8 9 14C8 20 2 22 2 22Z"/><path class="leaf-svg" d="M9 14L22 4"/></svg>
            </div>
            <div class="input-block">
                <div class="input-header-meta">
                    <span class="input-label">Petal Width</span>
                    <span class="unit-badge">cm</span>
                </div>
                <input type="number" id="pw" step="0.1" value="0.2">
            </div>
        </div>

        <button onclick="predict()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            Get Prediction
        </button>

        <div id="result-section">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#34bc98" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <div class="result-info">
                <div class="result-title">Classification Result</div>
                <div id="species-name" class="result-species">Iris-setosa</div>
            </div>
        </div>

        <div class="footer-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            Make sure to enter values in centimeters (cm).
        </div>
    </div>

    <script>
        async function predict() {
            const resultSection = document.getElementById('result-section');
            const speciesName = document.getElementById('species-name');

            const inputData = {
                sepal_length: document.getElementById('sl').value,
                sepal_width: document.getElementById('sw').value,
                petal_length: document.getElementById('pl').value,
                petal_width: document.getElementById('pw').value
            };

            try {
                resultSection.style.display = 'flex';
                speciesName.innerText = 'Analyzing Data...';
                speciesName.style.color = '#94a3b8';

                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(inputData)
                });

                const data = await response.json();
                
                if (data.prediction) {
                    speciesName.style.color = '#34bc98';
                    speciesName.innerText = data.prediction;
                } else {
                    speciesName.style.color = '#ef4444';
                    speciesName.innerText = `Error: ${data.error}`;
                }

            } catch (error) {
                speciesName.style.color = '#ef4444';
                speciesName.innerText = 'Server Connection Offline';
                console.error(error);
            }
        }
    </script>
</body>
</html>
